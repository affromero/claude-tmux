# Fix colors — advertise 256color so bashrc enables color prompt
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# Image passthrough for yazi/sixel (requires tmux 3.5a+)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment SSH_CONNECTION
set -ga update-environment SSH_TTY

# Set terminal title to session:window name (shows in VS Code/Ghostty tabs)
# Prefix with [SSH] when connected remotely
set -g set-titles on
if-shell '[ -n "$SSH_CONNECTION" ] || [ "$(hostname -s)" = "ubuntu" ]' {
    set -g set-titles-string "[SSH] #S:#W"
} {
    set -g set-titles-string "#S:#W"
}

# Enable mouse scrolling + clicking + pane resizing
set -g mouse on

# Use vi keys in copy mode (consistent with vim-style pane switching)
setw -g mode-keys vi

# Clipboard via OSC 52 (works over SSH — terminal sends to local clipboard)
# On macOS (local), change copy-selection-and-cancel to copy-pipe-and-cancel "pbcopy"
set -g set-clipboard on
set -ga terminal-overrides ',xterm-256color:Ms=\E]52;c;%p2%s\007'
set -ga terminal-overrides ',xterm-ghostty:Ms=\E]52;c;%p2%s\007'
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Restore default left-click in copy mode (position cursor, don't cancel)
bind -T copy-mode-vi MouseDown1Pane select-pane
bind -T copy-mode MouseDown1Pane select-pane

# Right-click exits copy mode (left-click drag still works for selection)
bind -T copy-mode-vi MouseDown3Pane select-pane \; send-keys -X cancel
bind -T copy-mode MouseDown3Pane select-pane \; send-keys -X cancel

# Slow down scroll speed (default sends 5 lines per tick — too fast)
bind -T copy-mode-vi WheelUpPane send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down
bind -T copy-mode WheelUpPane send-keys -X -N 2 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 2 scroll-down

# Increase scrollback buffer (default is 2000)
set -g history-limit 50000

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Easy pane splitting (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch panes with Alt+arrow (no prefix needed)
# NOTE: On macOS, Option must send Meta for these to work
# iTerm2: Settings → Profiles → Keys → Left Option key → Esc+
# Terminal.app: Settings → Profiles → Keyboard → Use Option as Meta key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch panes with arrows (Ctrl+b then arrow) — works everywhere
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Resize panes with WASD (Ctrl+b then Shift+w/a/s/d) — 5 cells per press
bind -r A resize-pane -L 5
bind -r S resize-pane -D 5
bind -r W resize-pane -U 5
bind -r D resize-pane -R 5

# Rename pane title (Ctrl+b T) — set custom names for AI tooling reference
bind T command-prompt -p "pane title:" "select-pane -T '%%'"

# Highlight active pane border, dim inactive borders
set -g pane-border-style 'fg=colour130'
set -g pane-active-border-style 'fg=colour214'

# Show pane name in border — subtle label for AI tooling reference
# Displays pane index + running command (or custom title if set via Ctrl+b T)
set -g pane-border-status top
set -g pane-border-format '#[fg=colour238] #S:#P #{pane_current_command} '

# Dim inactive panes — use default bg so Ghostty's palette shows through
set -g window-style 'fg=colour240,bg=default'
set -g window-active-style 'fg=colour255,bg=default'

# Easy session switching (tree view)
bind s choose-tree -sZ

# ── Status bar (3 lines: system, Claude, Codex) ────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-style 'bg=colour235,fg=colour248'
set -g status 3

# ── Line 0: Session + windows + system stats ──────────────────
# Left: session name (tagged when SSH)
set -g status-left-length 30
if-shell '[ -n "$SSH_CONNECTION" ] || [ "$(hostname -s)" = "ubuntu" ]' {
    set -g status-left '#[fg=colour245][SSH] #[fg=colour214,bold]#S #[fg=colour238]│ '
} {
    set -g status-left '#[fg=colour214,bold] #S #[fg=colour238]│ '
}

# Right: system stats + datetime (updates every status-interval)
set -g status-right-length 250
set -g status-right '#(~/.tmux/scripts/sys-stats.sh) #[fg=colour238]│ #[fg=colour214]%b %d #[fg=colour255]%H:%M '

# ── Line 1: Claude Code limits ────────────────────────────────
set -g status-format[1] '#[align=left,bg=colour233]#(~/.tmux/scripts/claude-limits.sh)'

# ── Line 2: Codex limits ─────────────────────────────────────
set -g status-format[2] '#[align=left,bg=colour232]#(~/.tmux/scripts/codex-limits.sh)'

# Window tabs
setw -g window-status-format '#[fg=colour245] #I:#W '
setw -g window-status-current-format '#[fg=colour214,bold] #I:#W '

# Plugins (save/restore sessions across reboots)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 15 min, auto-restore on server start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
